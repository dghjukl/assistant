<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOS</title>
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --border:   #1e2330;
    --accent:   #4f8ef7;
    --accent2:  #7c5cfc;
    --green:    #3dd68c;
    --yellow:   #f5c542;
    --red:      #f25f5c;
    --text:     #e2e6f0;
    --muted:    #5a6070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

  /* App shell header */
  #app-header {
    height: 44px;
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 16px;
  }
  #app-logo {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: #fff;
    flex-shrink: 0;
    margin-right: 10px;
    box-shadow: 0 0 10px rgba(79,142,247,0.35);
  }
  #app-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    margin-right: 20px;
    flex-shrink: 0;
  }

  /* Tab navigation */
  #app-nav {
    display: flex;
    gap: 2px;
    flex: 1;
  }
  .app-tab-btn {
    padding: 6px 16px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    font-weight: 500;
  }
  .app-tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .app-tab-btn.active { color: var(--accent); background: rgba(79,142,247,0.1); }

  /* Status area */
  #app-status-area {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-left: auto;
    flex-shrink: 0;
  }
  #app-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s;
  }
  #app-status-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #app-status-dot.booting { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1.2s infinite; }
  #app-status-dot.error   { background: var(--red); }
  #app-status-label { font-size: 12px; color: var(--muted); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* Tab panes */
  #app-body {
    height: calc(100vh - 44px);
    position: relative;
  }
  .app-pane {
    position: absolute;
    inset: 0;
    display: none;
  }
  .app-pane.active { display: block; }
  .app-pane iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>
<div id="app-header">
  <div id="app-logo">EOS</div>
  <div id="app-name">EOS</div>
  <div id="app-nav">
    <button class="app-tab-btn active" onclick="switchTab('workspace')">Workspace</button>
    <button class="app-tab-btn" onclick="switchTab('system')">System</button>
    <button class="app-tab-btn" onclick="switchTab('docs')">Docs</button>
  </div>
  <div id="app-status-area">
    <div id="app-status-dot" class="booting"></div>
    <div id="app-status-label">connecting...</div>
  </div>
</div>
<div id="app-body">
  <div class="app-pane active" id="pane-workspace">
    <iframe id="frame-workspace" src="/workspace?embed=1" title="Workspace"></iframe>
  </div>
  <div class="app-pane" id="pane-system">
    <iframe id="frame-system" data-src="/admin?embed=1" title="System"></iframe>
  </div>
  <div class="app-pane" id="pane-docs">
    <iframe id="frame-docs" data-src="/docs?embed=1" title="Docs"></iframe>
  </div>
</div>
<script>
let activeTab = 'workspace';

function switchTab(name) {
  if (name === activeTab) return;

  // Update buttons
  document.querySelectorAll('.app-tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === name);
  });

  // Update panes
  document.querySelectorAll('.app-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');

  // Lazy-load iframes on first open (use data-loaded flag; src="" resolves to page URL)
  const iframe = document.getElementById('frame-' + name);
  if (iframe && !iframe.dataset.loaded && iframe.dataset.src) {
    iframe.src = iframe.dataset.src;
    iframe.dataset.loaded = '1';
  }

  activeTab = name;
  history.pushState({tab: name}, '', '#' + name);
}

// Restore tab from hash on load
const initTab = (location.hash || '').replace('#','') || 'workspace';
if (initTab !== 'workspace') switchTab(initTab);

window.addEventListener('popstate', e => {
  const tab = (e.state && e.state.tab) || (location.hash||'').replace('#','') || 'workspace';
  switchTab(tab);
});

// Listen for cross-frame tab switch messages from docs/admin
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'eos-switch-tab') {
    switchTab(e.data.tab);
  }
});

// Poll workspace iframe for status to update the shell status dot
function syncStatus() {
  try {
    const frame = document.getElementById('frame-workspace');
    const fdoc = frame.contentDocument || frame.contentWindow.document;
    const dot = fdoc.getElementById('status-dot');
    const label = fdoc.getElementById('status-label');
    const appDot = document.getElementById('app-status-dot');
    const appLabel = document.getElementById('app-status-label');
    if (dot) {
      appDot.className = dot.className;
    }
    if (label) appLabel.textContent = label.textContent;
  } catch(_) {}
}
setInterval(syncStatus, 2000);
</script>
</body>
</html>
