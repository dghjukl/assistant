<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EOS Documentation</title>
<style>
:root {
  --bg:        #0d0f14;
  --surface:   #161920;
  --surface2:  #1c2030;
  --border:    #252932;
  --accent:    #4f9cf9;
  --green:     #22c55e;
  --red:       #ef4444;
  --yellow:    #eab308;
  --purple:    #a78bfa;
  --amber:     #f59e0b;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --font:      'Segoe UI', system-ui, sans-serif;
  --mono:      'Cascadia Code', Consolas, monospace;
  --sw:        252px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.75;display:flex;min-height:100vh;}

/* ── Sidebar ── */
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;display:flex;flex-direction:column;z-index:100;}
.sb-logo{padding:16px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-logo-inner{text-decoration:none;display:flex;align-items:center;gap:10px;cursor:pointer;}
.sb-title{font-size:16px;font-weight:700;color:var(--accent);}
.sb-sub{font-size:11px;color:var(--muted);}
.sb-ext-links{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-ext-link{flex:1;display:block;padding:7px 0;text-align:center;font-size:12px;color:var(--muted);text-decoration:none;}
.sb-ext-link:hover{color:var(--accent);}
.sb-ext-link+.sb-ext-link{border-left:1px solid var(--border);}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.sb-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;}
.sb-search input:focus{border-color:var(--accent);}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0 24px;}
.sb-group{padding:14px 18px 4px;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:5px 18px;font-size:13px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:color .12s,background .12s;cursor:pointer;user-select:none;}
.sb-item:hover{color:var(--text);background:var(--surface2);}
.sb-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--surface2);}
.sb-item.indent{padding-left:34px;font-size:12px;}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}

/* ── Main ── */
.main{margin-left:var(--sw);flex:1;min-width:0;display:flex;flex-direction:column;}

/* ── Topbar / breadcrumb ── */
.topbar{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 48px;display:flex;align-items:center;z-index:50;min-height:44px;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.breadcrumb a{color:var(--muted);text-decoration:none;cursor:pointer;}
.breadcrumb a:hover{color:var(--accent);}
.bc-sep{color:var(--border);font-size:14px;}
.bc-current{color:var(--text);}

/* ── Content ── */
.content-wrap{flex:1;display:flex;justify-content:center;}
.content-inner{max-width:820px;width:100%;padding:48px 48px 80px;}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;height:300px;color:var(--muted);font-size:13px;gap:12px;}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Prev/Next nav ── */
.page-nav{display:flex;gap:16px;margin-top:64px;padding-top:32px;border-top:1px solid var(--border);}
.pn-btn{flex:1;display:flex;flex-direction:column;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);transition:border-color .15s;cursor:pointer;}
.pn-btn:hover{border-color:var(--accent);}
.pn-btn.next{text-align:right;align-items:flex-end;}
.pn-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.pn-title{font-size:14px;font-weight:600;color:var(--accent);}

/* ── Embedded mode ── */
html.embedded .mob-bar { display: none !important; }
html.embedded .sb-ext-links { display: none !important; }

/* ── Mobile bar ── */
.mob-bar{display:none;position:fixed;top:0;left:0;right:0;height:48px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;padding:0 16px;gap:12px;z-index:200;}
.mob-logo{font-size:15px;font-weight:700;color:var(--accent);}
.mob-menu{margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;}

/* ── Search results ── */
.search-drop{position:absolute;left:12px;right:12px;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;z-index:300;display:none;}
.search-drop.open{display:block;}
.sr-item{display:block;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--surface);}
.sr-page{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;margin-bottom:2px;}
.sr-text{font-size:12px;color:var(--text);line-height:1.4;}
.sr-hi{background:rgba(79,156,249,.18);color:var(--accent);border-radius:2px;}
.sr-none{padding:16px;text-align:center;color:var(--muted);font-size:13px;}

/* ════════════════════════════════════════
   CONTENT STYLES (used by injected pages)
   ════════════════════════════════════════ */

/* Page header */
.page-header{margin-bottom:48px;}
.page-eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.page-title{font-size:36px;font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-.02em;}
.page-title span{color:var(--accent);}
.page-lead{font-size:16px;color:var(--muted);max-width:640px;line-height:1.65;}

/* Guide cards (home) */
.guide-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:32px 0;}
.guide-card{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;text-decoration:none;color:var(--text);transition:border-color .15s,transform .15s;cursor:pointer;}
.guide-card:hover{border-color:var(--card-clr,var(--accent));transform:translateY(-2px);}
.guide-card.blue  {--card-clr:var(--accent);}
.guide-card.green {--card-clr:var(--green);}
.guide-card.purple{--card-clr:var(--purple);}
.guide-card.amber {--card-clr:var(--amber);}
.guide-card.red   {--card-clr:var(--red);}
.gc-icon {font-size:28px;margin-bottom:12px;}
.gc-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.gc-desc {font-size:13px;color:var(--muted);line-height:1.5;flex:1;}
.gc-cta  {margin-top:16px;font-size:12px;font-weight:600;color:var(--card-clr,var(--accent));}

/* Sections */
.doc-section{scroll-margin-top:24px;margin-bottom:52px;}
.section-eyebrow{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
h2.section-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em;}
h2.section-title .anchor{color:inherit;text-decoration:none;}
h2.section-title .anchor:hover{color:var(--accent);}
.section-lead{color:var(--muted);margin-bottom:24px;max-width:680px;font-size:14px;line-height:1.7;}
h3.sub-title{font-size:15px;font-weight:600;margin:20px 0 10px;color:var(--text);letter-spacing:-.01em;}
h3.sub-title .anchor{color:inherit;text-decoration:none;}
h3.sub-title .anchor:hover{color:var(--accent);}
.doc-p{margin:8px 0;color:var(--text);line-height:1.75;}
.doc-rule{border:none;border-top:1px solid var(--border);margin:52px 0;}

/* Step cards */
.step-list{display:flex;flex-direction:column;gap:12px;}
.step-card{display:flex;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-num.green {background:var(--green);}
.step-num.purple{background:var(--purple);}
.step-num.amber {background:var(--amber);}
.step-body{flex:1;min-width:0;}
.step-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.step-desc{font-size:13px;color:var(--muted);line-height:1.65;}

/* Callouts */
.callout{display:flex;gap:14px;border-radius:10px;padding:16px 18px;margin:16px 0;border:1px solid;}
.callout.tip      {background:#0a1525;border-color:#1a3a60;}
.callout.important{background:#0a1f12;border-color:#1a4a28;}
.callout.warning  {background:#1f1a0a;border-color:#4a3a0a;}
.callout.trouble  {background:#1f0a0a;border-color:#4a1a1a;}
.callout.ai-prompt{background:#150f28;border-color:#3a2868;}
.callout-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.callout-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.callout.tip       .callout-title{color:var(--accent);}
.callout.important .callout-title{color:var(--green);}
.callout.warning   .callout-title{color:var(--yellow);}
.callout.trouble   .callout-title{color:var(--red);}
.callout.ai-prompt .callout-title{color:var(--purple);}
.callout-body{flex:1;font-size:13px;line-height:1.65;}
.prompt-text{font-style:italic;color:var(--muted);margin:6px 0;}
.prompt-copy{margin-top:8px;background:var(--purple);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;}
.prompt-copy:hover{opacity:.85;}

/* Code blocks */
.code-wrap{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin:8px 0;}
.code-label{padding:6px 14px 0;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.code-wrap pre{padding:12px 16px 14px;font-family:var(--mono);font-size:12px;line-height:1.65;overflow-x:auto;white-space:pre;color:#c9d1d9;}
.code-copy{position:absolute;top:8px;right:8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;padding:3px 8px;cursor:pointer;}
.code-copy:hover{color:var(--text);}

/* Inline code */
code{font-family:var(--mono);font-size:12px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:#c9d1d9;}

/* Tables */
.table-wrap{overflow-x:auto;margin:10px 0;}
.doc-table{width:100%;border-collapse:collapse;font-size:13px;}
.doc-table th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
.doc-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
.doc-table tr:last-child td{border-bottom:none;}
.doc-table code{font-size:11px;}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin:12px 0;}
.cap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.cap-card-icon {font-size:22px;margin-bottom:8px;}
.cap-card-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.cap-card-desc {font-size:12px;color:var(--muted);line-height:1.5;}

/* Mode cards */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;}
.mode-card.on  {border-color:var(--green);}
.mode-card.warn{border-color:var(--yellow);}
.mode-card.off {border-color:var(--muted);}
.mode-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.mode-desc{font-size:12px;color:var(--muted);}

/* Dimension cards */
.dim-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0;}
.dim-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.dim-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.dim-what{font-size:12px;color:var(--muted);line-height:1.5;}

/* Status badges */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;}
.badge.active  {background:#0a2a16;color:var(--green); border:1px solid var(--green);}
.badge.degraded{background:#2a1f0a;color:var(--yellow);border:1px solid var(--yellow);}
.badge.unavail {background:#2a0a0a;color:var(--red);   border:1px solid var(--red);}

/* Dir tree */
.dir-tree{font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;line-height:1.85;color:#c9d1d9;}
.dir-comment{color:var(--muted);}

/* File path */
.file-path{font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin:8px 0;color:var(--accent);display:block;}

/* Lists */
ul.doc-list,ol.doc-list{padding-left:20px;margin:8px 0;}
ul.doc-list li,ol.doc-list li{margin:4px 0;font-size:13px;color:var(--text);}
ul.doc-list li code,ol.doc-list li code{font-size:11px;}

/* Responsive */
@media(max-width:900px){
  .mob-bar{display:flex;}
  .sidebar{transform:translateX(-100%);transition:transform .2s;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px #00000080;}
  .main{margin-left:0;padding-top:48px;}
  .topbar{padding:10px 20px;}
  .content-inner{padding:32px 20px 60px;}
  .guide-grid{grid-template-columns:1fr;}
  .mode-grid{grid-template-columns:1fr;}
  .dim-grid{grid-template-columns:1fr;}
  .page-nav{flex-direction:column;}
}
</style>
<script>
if (new URLSearchParams(location.search).get('embed') === '1') {
  document.documentElement.classList.add('embedded');
}
</script>
</head>
<body>

<div class="mob-bar" id="mob-bar">
  <span class="mob-logo">EOS</span>
  <button class="mob-menu" onclick="toggleSidebar()">&#9776;</button>
</div>

<nav class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-inner" onclick="go('home')">
      <div><div class="sb-title">EOS</div><div class="sb-sub">Documentation</div></div>
    </div>
  </div>
  <div class="sb-ext-links">
    <a class="sb-ext-link" href="/" onclick="if(window.parent!==window){event.preventDefault();window.parent.postMessage({type:'eos-switch-tab',tab:'workspace'},'*')}">&#8592; Chat</a>
    <a class="sb-ext-link" href="/admin" onclick="if(window.parent!==window){event.preventDefault();window.parent.postMessage({type:'eos-switch-tab',tab:'system'},'*')}">&#9881; System</a>
  </div>
  <div class="sb-search">
    <input type="text" id="srch" placeholder="Search docs..." autocomplete="off"
           oninput="onSearch(this.value)" onfocus="onSearchFocus()"/>
    <div class="search-drop" id="srch-drop"></div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="bc"></div>
  </div>
  <div class="content-wrap">
    <div class="content-inner" id="ca">
      <div class="loading"><div class="spin"></div>Loading...</div>
    </div>
  </div>
</div>

<script>
// ── Route definitions ─────────────────────────────────────────────────────
const R = [
  {id:'home',           title:'Overview',                icon:'&#127968;', group:null,           sub:false},
  {id:'quick-start',    title:'Quick Start',             icon:'&#128640;', group:'Getting Started',sub:false},
  {id:'install',        title:'Install & Setup',         icon:'&#128230;', group:'Getting Started',sub:true},
  {id:'using-eos',      title:'Using EOS',               icon:'&#128172;', group:'Getting Started',sub:true},
  {id:'admin-panel',    title:'Admin Panel',             icon:'&#128295;', group:'Operations',    sub:false},
  {id:'capabilities',   title:'Capabilities & Autonomy', icon:'&#127897;', group:'Capabilities',  sub:false},
  {id:'voice',          title:'Voice',                   icon:'&#127897;', group:'Capabilities',  sub:true},
  {id:'discord',        title:'Discord',                 icon:'&#128172;', group:'Capabilities',  sub:true},
  {id:'google',         title:'Google Workspace',        icon:'&#128308;', group:'Capabilities',  sub:true},
  {id:'computer-use',   title:'Computer Use',            icon:'&#128421;', group:'Capabilities',  sub:true},
  {id:'access-tiers',   title:'Access Tiers & LAN',      icon:'&#128275;', group:'Capabilities',  sub:true},
  {id:'workspace',      title:'Workspace',               icon:'&#128193;', group:'Capabilities',  sub:true},
  {id:'worldview',      title:'Worldview',               icon:'&#127759;', group:'Capabilities',  sub:true},
  {id:'cognition',      title:'Cognition & Diagnostics', icon:'&#128300;', group:'Capabilities',  sub:true},
  {id:'troubleshooting',title:'Troubleshooting',         icon:'&#9888;',   group:'Support',       sub:false},
  {id:'power-user',     title:'Power User Guide',        icon:'&#9889;',   group:'Advanced',      sub:false},
  {id:'reference',      title:'Reference',               icon:'&#128211;', group:'Advanced',      sub:false},
];

// ── State ─────────────────────────────────────────────────────────────────
let cur   = null;
const C   = {};   // page cache: { html, text }
let srchT = null;

// ── Build sidebar ─────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sb-nav');
  let lastG = '\x00', html = '';
  for (const r of R) {
    const g = r.group || '';
    if (g !== lastG) {
      if (g) html += `<div class="sb-group">${g}</div>`;
      lastG = g;
    }
    html += `<div class="sb-item${r.sub?' indent':''}" id="n-${r.id}" onclick="go('${r.id}')">`
          + `<span class="sb-icon">${r.icon}</span>${r.title}</div>`;
  }
  nav.innerHTML = html;
}

// ── Navigate ──────────────────────────────────────────────────────────────
async function go(id, push=true) {
  const route = R.find(r=>r.id===id) || R[0];
  id = route.id;
  cur = id;

  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const nl = document.getElementById('n-'+id);
  if (nl) { nl.classList.add('active'); nl.scrollIntoView({block:'nearest'}); }

  if (push) history.pushState({id}, '', '#'+id);

  renderBC(route);

  const ca = document.getElementById('ca');
  ca.innerHTML = '<div class="loading"><div class="spin"></div>Loading...</div>';

  const html = await fetchPage(id);
  ca.innerHTML = html;
  postProcess(ca);
  renderPageNav(id);
  window.scrollTo(0,0);
  document.getElementById('sidebar').classList.remove('open');
  cacheText(id, ca);
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function fetchPage(id) {
  if (C[id] && C[id].html) return C[id].html;
  try {
    const r = await fetch('/docs/content/'+id);
    if (!r.ok) throw 0;
    const html = await r.text();
    if (!C[id]) C[id]={};
    C[id].html = html;
    return html;
  } catch(_) {
    return '<div class="callout trouble" style="margin-top:40px">'
         + '<div class="callout-icon">&#10060;</div>'
         + '<div><div class="callout-title">Page not found</div>'
         + '<div class="callout-body">Could not load <code>'+id+'</code>. '
         + 'Make sure EOS is running and try refreshing.</div></div></div>';
  }
}

// ── Post-processing ───────────────────────────────────────────────────────
function postProcess(root) {
  // Copy buttons on code blocks
  root.querySelectorAll('.code-wrap').forEach(w => {
    if (w.querySelector('.code-copy')) return;
    const pre = w.querySelector('pre');
    if (!pre) return;
    const b = document.createElement('button');
    b.className = 'code-copy';
    b.textContent = 'Copy';
    b.onclick = () => {
      navigator.clipboard.writeText(pre.textContent.trim()).then(()=>{
        b.textContent='Copied!';
        setTimeout(()=>b.textContent='Copy',2000);
      });
    };
    w.appendChild(b);
  });
  // Anchor links on headings with IDs
  root.querySelectorAll('h2[id],h3[id]').forEach(h => {
    if (h.querySelector('.anchor')) return;
    const a = document.createElement('a');
    a.className = 'anchor';
    a.href = '#'+h.id;
    a.innerHTML = h.innerHTML;
    h.innerHTML = '';
    h.appendChild(a);
  });
}

// ── Breadcrumb ────────────────────────────────────────────────────────────
function renderBC(route) {
  const el = document.getElementById('bc');
  let h = '<a onclick="go(\'home\')">Docs</a>';
  if (route.group) {
    h += '<span class="bc-sep">&#8250;</span><span>'+route.group+'</span>';
  }
  if (route.id !== 'home') {
    h += '<span class="bc-sep">&#8250;</span><span class="bc-current">'+route.title+'</span>';
  }
  el.innerHTML = h;
}

// ── Prev / Next ───────────────────────────────────────────────────────────
function renderPageNav(id) {
  const i    = R.findIndex(r=>r.id===id);
  const prev = i>0           ? R[i-1] : null;
  const next = i<R.length-1  ? R[i+1] : null;
  let h = '<div class="page-nav">';
  h += prev
    ? `<div class="pn-btn" onclick="go('${prev.id}')"><div class="pn-label">&#8592; Previous</div><div class="pn-title">${prev.title}</div></div>`
    : '<div></div>';
  h += next
    ? `<div class="pn-btn next" onclick="go('${next.id}')"><div class="pn-label">Next &#8594;</div><div class="pn-title">${next.title}</div></div>`
    : '<div></div>';
  h += '</div>';
  document.getElementById('ca').insertAdjacentHTML('beforeend', h);
}

// ── Search ────────────────────────────────────────────────────────────────
function cacheText(id, root) {
  if (!C[id]) C[id]={};
  if (!C[id].text) C[id].text = root.textContent;
}

async function prefetch() {
  for (const r of R) {
    if (C[r.id] && C[r.id].text) continue;
    try {
      const res  = await fetch('/docs/content/'+r.id);
      if (!res.ok) continue;
      const html = await res.text();
      if (!C[r.id]) C[r.id]={};
      C[r.id].html = html;
      const d = document.createElement('div');
      d.innerHTML = html;
      C[r.id].text = d.textContent;
    } catch(_) {}
  }
}

function onSearch(q) {
  clearTimeout(srchT);
  if (!q.trim()) { closeDrop(); return; }
  srchT = setTimeout(()=>doSearch(q.trim()), 180);
}

function onSearchFocus() {
  const q = document.getElementById('srch').value.trim();
  if (q) doSearch(q);
}

function doSearch(q) {
  const drop  = document.getElementById('srch-drop');
  const words = q.toLowerCase().split(/\s+/).filter(Boolean);
  const hits  = [];
  for (const r of R) {
    const txt = C[r.id] && C[r.id].text;
    if (!txt) continue;
    const tl = txt.toLowerCase();
    if (!words.every(w=>tl.includes(w))) continue;
    const idx   = tl.indexOf(words[0]);
    const s     = Math.max(0,idx-35);
    const e     = Math.min(txt.length,idx+110);
    let snip    = txt.slice(s,e).replace(/\s+/g,' ').trim();
    if (s>0) snip='...'+snip;
    const re    = new RegExp(words.map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'gi');
    const snipH = snip.replace(re, m=>`<span class="sr-hi">${m}</span>`);
    hits.push({r, snipH});
    if (hits.length>=7) break;
  }
  if (hits.length===0) {
    drop.innerHTML = `<div class="sr-none">No results for "${q}"</div>`;
  } else {
    drop.innerHTML = hits.map(({r,snipH})=>
      `<div class="sr-item" onclick="go('${r.id}');closeDrop();document.getElementById('srch').value=''">
         <div class="sr-page">${r.title}</div>
         <div class="sr-text">${snipH}</div>
       </div>`
    ).join('');
  }
  drop.classList.add('open');
}

function closeDrop() {
  document.getElementById('srch-drop').classList.remove('open');
}

document.addEventListener('click', e=>{
  if (!e.target.closest('.sb-search')) closeDrop();
});

// ── Prompt copy (used by content pages) ───────────────────────────────────
function copyPrompt(btn) {
  const txt = btn.closest('.callout').querySelector('.prompt-text').textContent.trim();
  navigator.clipboard.writeText(txt).then(()=>{
    const o = btn.textContent;
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent=o,2000);
  });
}

// ── Mobile sidebar ────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── nav() alias (used by content pages) ──────────────────────────────────
const nav = go;

// ── Init ──────────────────────────────────────────────────────────────────
buildNav();
const initId = (location.hash||'').replace('#','') || 'home';
go(initId, false);
window.addEventListener('popstate', e=>{
  go((e.state&&e.state.id)||(location.hash||'').replace('#','')||'home', false);
});
setTimeout(prefetch, 1200);
</script>
